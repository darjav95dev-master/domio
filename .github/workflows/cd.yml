name: CD

# develop → despliega Development · main → despliega Producción.
# feature/* NO despliega (solo CI en ci.yml).
on:
  push:
    branches: [develop, main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/domio-web
  IMAGE_TOOLS: ghcr.io/${{ github.repository_owner }}/domio-tools

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          echo "tag=${{ github.ref_name == 'main' && 'latest' || 'develop' }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Imagen web (standalone). Los NEXT_PUBLIC_* se incrustan en build → por entorno.
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_ENV=${{ vars.NEXT_PUBLIC_APP_ENV }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            PUBLIC_TENANT_ID=${{ vars.PUBLIC_TENANT_ID }}
            R2_PUBLIC_URL=${{ vars.R2_PUBLIC_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_RELEASE=${{ github.sha }}

      # Imagen tools (worker + migraciones).
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: tools
          tags: |
            ${{ env.IMAGE_TOOLS }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_TOOLS }}:${{ github.sha }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Deploy por SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/domio
            # Fija la rama que dispara el deploy (no la que el VPS tuviera puesta):
            # así un deploy de develop no se despliega sobre un checkout de main.
            git fetch origin ${{ github.ref_name }}
            git checkout ${{ github.ref_name }}
            git pull --ff-only
            PROJECT=${{ github.ref_name == 'main' && 'domio-prod' || 'domio-dev' }}
            ENVFILE=deploy/env.${{ github.ref_name == 'main' && 'prod' || 'dev' }}
            COMPOSE="docker compose -p $PROJECT --env-file $ENVFILE -f deploy/docker-compose.app.yml"

            # Se despliega por SHA (tag inmutable que también empuja el build). El
            # tag móvil (latest/develop) no sirve para rollback: tras el push ya
            # apunta a la imagen nueva, así que "volver a latest" no vuelve atrás.
            NEW_TAG=${{ github.sha }}
            MOVING_TAG=${{ github.ref_name == 'main' && 'latest' || 'develop' }}
            PREV_TAG=$(cat backups/.last_good_tag 2>/dev/null || echo "$MOVING_TAG")
            export IMAGE_TAG=$NEW_TAG

            # 1. Backup pre-deploy (usa el usuario/BD del propio contenedor)
            mkdir -p backups
            $COMPOSE exec -T postgres sh -c 'pg_dump -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Fc' \
              > backups/${PROJECT}_$(date +%Y%m%d_%H%M).dump || echo "aviso: sin DB previa (primer deploy)"

            # 2. Traer la imagen nueva por SHA
            $COMPOSE pull

            # 3. Migraciones (expand/contract; forward-only). El servicio es `worker`.
            $COMPOSE run --rm worker pnpm db:migrate

            # 4. Recrear web + worker
            $COMPOSE up -d

            # 5. Healthcheck; si pasa, este SHA queda como último bueno.
            for i in $(seq 1 10); do
              if curl -fsS http://localhost:80/api/health >/dev/null 2>&1 || \
                 docker exec ${PROJECT}-web-1 node -e "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
                echo "$NEW_TAG" > backups/.last_good_tag
                echo "healthy"; exit 0
              fi
              echo "esperando healthcheck ($i)…"; sleep 6
            done

            # 6. Rollback al último SHA bueno (imagen inmutable, sigue en GHCR).
            echo "❌ healthcheck falló → rollback a $PREV_TAG"
            export IMAGE_TAG=$PREV_TAG
            $COMPOSE pull
            $COMPOSE up -d
            exit 1
